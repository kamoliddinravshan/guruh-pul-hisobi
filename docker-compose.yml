version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xarajat_db
      POSTGRES_USER: xarajat
      POSTGRES_PASSWORD: ${DB_PASSWORD:-xarajat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./server
      dockerfile: docker/Dockerfile
    command: sh -c "python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    environment:
      DATABASE_URL: postgresql://xarajat:${DB_PASSWORD:-xarajat}@db:5432/xarajat_db
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-change-me-minimum-50-random-characters-for-production}
      DEBUG: 'False'
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      - db
      - redis

  celery:
    build:
      context: ./server
      dockerfile: docker/Dockerfile
    command: celery -A celery_app worker -l info -Q default
    environment:
      DATABASE_URL: postgresql://xarajat:${DB_PASSWORD:-xarajat}@db:5432/xarajat_db
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-change-me-minimum-50-random-characters-for-production}
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./server/docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
