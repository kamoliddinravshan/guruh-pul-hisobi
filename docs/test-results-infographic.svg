<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFF6FF"/>
      <stop offset="0.52" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#16A34A"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.13"/>
    </filter>
    <style>
      .title { font: 700 54px 'Plus Jakarta Sans', Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 500 24px 'Plus Jakarta Sans', Arial, sans-serif; fill: #64748B; }
      .card-title { font: 700 25px 'Plus Jakarta Sans', Arial, sans-serif; fill: #0F172A; }
      .label { font: 600 21px 'Plus Jakarta Sans', Arial, sans-serif; fill: #334155; }
      .muted { font: 500 18px 'Plus Jakarta Sans', Arial, sans-serif; fill: #64748B; }
      .small { font: 500 16px 'Plus Jakarta Sans', Arial, sans-serif; fill: #64748B; }
      .number { font: 800 58px 'Plus Jakarta Sans', Arial, sans-serif; fill: #0F172A; }
      .white-title { font: 800 44px 'Plus Jakarta Sans', Arial, sans-serif; fill: #FFFFFF; }
      .white-muted { font: 600 20px 'Plus Jakarta Sans', Arial, sans-serif; fill: #DBEAFE; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <rect x="80" y="70" width="1440" height="860" rx="38" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="80" y="70" width="1440" height="190" rx="38" fill="url(#blue)"/>
  <path d="M80 220C296 255 472 180 670 208C852 233 1005 291 1190 240C1314 206 1421 190 1520 218V260H80V220Z" fill="#1E40AF" opacity="0.34"/>

  <text x="130" y="150" class="white-title">Xarajat Taqsimlagich</text>
  <text x="130" y="198" class="white-muted">Unit va integration test natijalari</text>
  <text x="1190" y="150" text-anchor="end" class="white-muted">Backend + Frontend</text>
  <text x="1190" y="198" text-anchor="end" class="white-muted">2026-yil · BMI uchun</text>

  <g transform="translate(130 310)">
    <rect width="300" height="170" rx="24" fill="#F8FAFC" stroke="#E2E8F0"/>
    <circle cx="58" cy="62" r="30" fill="#DCFCE7"/>
    <path d="M46 62L55 71L72 51" stroke="#16A34A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="32" y="125" class="number">13</text>
    <text x="125" y="111" class="card-title">Backend</text>
    <text x="125" y="141" class="muted">pytest passed</text>
  </g>

  <g transform="translate(470 310)">
    <rect width="300" height="170" rx="24" fill="#F8FAFC" stroke="#E2E8F0"/>
    <circle cx="58" cy="62" r="30" fill="#DBEAFE"/>
    <path d="M44 65H72M44 55H72M44 75H64" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
    <text x="32" y="125" class="number">12</text>
    <text x="125" y="111" class="card-title">Frontend</text>
    <text x="125" y="141" class="muted">Vitest passed</text>
  </g>

  <g transform="translate(810 310)">
    <rect width="300" height="170" rx="24" fill="#F8FAFC" stroke="#E2E8F0"/>
    <circle cx="58" cy="62" r="30" fill="#ECFDF5"/>
    <path d="M47 74V50M58 74V42M69 74V58" stroke="#059669" stroke-width="6" stroke-linecap="round"/>
    <text x="32" y="125" class="number">25</text>
    <text x="125" y="111" class="card-title">Jami test</text>
    <text x="125" y="141" class="muted">hammasi muvaffaqiyatli</text>
  </g>

  <g transform="translate(1150 310)">
    <rect width="300" height="170" rx="24" fill="#F8FAFC" stroke="#E2E8F0"/>
    <circle cx="58" cy="62" r="30" fill="#FEF3C7"/>
    <path d="M58 45V65M58 77H58.5" stroke="#D97706" stroke-width="7" stroke-linecap="round"/>
    <text x="32" y="125" class="number">0</text>
    <text x="125" y="111" class="card-title">Xatolik</text>
    <text x="125" y="141" class="muted">lint/build errors</text>
  </g>

  <g transform="translate(130 535)">
    <rect width="660" height="315" rx="28" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="34" y="54" class="card-title">Testlar taqsimoti</text>
    <text x="34" y="85" class="muted">Backend va frontend bo‘yicha passed testlar soni</text>

    <line x1="70" y1="260" x2="600" y2="260" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="70" y1="120" x2="70" y2="260" stroke="#CBD5E1" stroke-width="2"/>

    <rect x="125" y="132" width="120" height="128" rx="12" fill="url(#green)"/>
    <text x="185" y="118" text-anchor="middle" class="label">13</text>
    <text x="185" y="292" text-anchor="middle" class="muted">Backend</text>

    <rect x="375" y="142" width="120" height="118" rx="12" fill="url(#blue)"/>
    <text x="435" y="128" text-anchor="middle" class="label">12</text>
    <text x="435" y="292" text-anchor="middle" class="muted">Frontend</text>

    <text x="70" y="112" text-anchor="end" class="small">15</text>
    <text x="70" y="185" text-anchor="end" class="small">8</text>
    <text x="70" y="265" text-anchor="end" class="small">0</text>
  </g>

  <g transform="translate(830 535)">
    <rect width="300" height="315" rx="28" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="34" y="54" class="card-title">Umumiy holat</text>
    <text x="34" y="85" class="muted">25 / 25 test passed</text>

    <circle cx="150" cy="175" r="82" stroke="#DCFCE7" stroke-width="32"/>
    <circle cx="150" cy="175" r="82" stroke="#16A34A" stroke-width="32" stroke-dasharray="515 515" stroke-linecap="round" transform="rotate(-90 150 175)"/>
    <text x="150" y="166" text-anchor="middle" class="number" style="font-size:48px">100%</text>
    <text x="150" y="202" text-anchor="middle" class="muted">muvaffaqiyat</text>
  </g>

  <g transform="translate(1170 535)">
    <rect width="280" height="315" rx="28" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="30" y="54" class="card-title">Tekshiruvlar</text>
    <g transform="translate(30 100)">
      <circle cx="15" cy="15" r="15" fill="#DCFCE7"/>
      <path d="M8 15L13 20L23 9" stroke="#16A34A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="45" y="22" class="label">pytest</text>
      <text x="45" y="50" class="muted">13 passed</text>
    </g>
    <g transform="translate(30 175)">
      <circle cx="15" cy="15" r="15" fill="#DBEAFE"/>
      <path d="M8 15L13 20L23 9" stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="45" y="22" class="label">Vitest</text>
      <text x="45" y="50" class="muted">12 passed</text>
    </g>
    <g transform="translate(30 250)">
      <circle cx="15" cy="15" r="15" fill="#FEF3C7"/>
      <path d="M8 15L13 20L23 9" stroke="#D97706" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="45" y="22" class="label">Build/Lint</text>
      <text x="45" y="50" class="muted">0 error</text>
    </g>
  </g>

  <g transform="translate(130 880)">
    <rect width="1320" height="1" fill="#E2E8F0"/>
    <text x="0" y="42" class="small">Xulosa: testlar dasturdagi autentifikatsiya, guruh yaratish, xarajat qo‘shish, balans hisoblash, settlement va frontend state boshqaruvi to‘g‘ri ishlashini tasdiqlaydi.</text>
  </g>
</svg>
